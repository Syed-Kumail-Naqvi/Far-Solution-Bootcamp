<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 18 - Fetch API</title>
  <style>body{font-family:Segoe UI,sans-serif;background:#111;color:#f5f5f5;padding:24px;} .card{max-width:700px;margin:auto;background:#1f1f1f;padding:24px;border-radius:16px;} button{padding:10px 16px;border:none;border-radius:8px;background:#036537;color:white;cursor:pointer;} pre{background:#222;padding:12px;border-radius:8px;white-space:pre-wrap;}</style>
</head>
<body>
  <div class="card">
    <h1>Day 18 - Fetch API</h1>
    <p>Fetched sample data from a public API and displayed it in the page.</p>
    <button id="loadBtn">Load Posts</button>
    <pre id="output">Click button to load data.</pre>
  </div>
  <script>
    const loadBtn = document.getElementById('loadBtn');
    const output = document.getElementById('output');
    loadBtn.addEventListener('click', async () => {
      output.textContent = 'Loading...';
      const res = await fetch('https://jsonplaceholder.typicode.com/posts/1');
      const data = await res.json();
      output.textContent = JSON.stringify(data, null, 2);
    });
  </script>
</body>
</html>
