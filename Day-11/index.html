<!DOCTYPE html>
<html>
<head><title>Day 11 - JS Fundamentals</title></head>
<body>
    <h1>Day 11 - JavaScript Fundamentals</h1>
    <p>Open Console (F12) to see output.</p>
    <script>
        // Variables
        let name = "Ali";
        const age = 25;
        var city = "Karachi";
        
        // Data Types
        let isStudent = true;
        let score = null;
        let future; // undefined
        
        // Operators
        let a = 10, b = 3;
        let sum = a + b;
        let isGreater = a > b;
        let isEqual = (a === 10);
        
        console.log("Name:", name);
        console.log("Age:", age);
        console.log("City:", city);
        console.log("Is Student:", isStudent);
        console.log("Score:", score);
        console.log("Future:", future);
        console.log("Sum:", sum);
        console.log("Is a > b?", isGreater);
        console.log("Is a equal to 10?", isEqual);
        
        // String concatenation
        let greeting = "Hello, " + name + "!";
        console.log(greeting);
        
        // Template literal
        let message = `Welcome to Day 11, ${name}. You are ${age} years old.`;
        console.log(message);
    </script>
</body>
</html>
